server {
    listen 8080; 

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # Redirigir peticiones de VENTAS
    location /api/v1/ventas {
        proxy_pass http://api-ventas:8080; # Usamos el nombre del contenedor
        proxy_set_header Host $host;
    }

    # Redirigir peticiones de DESPACHOS
    location /api/v1/despachos {
        proxy_pass http://api-despachos:8080; # Usamos el nombre del contenedor
        proxy_set_header Host $host;
    }
}